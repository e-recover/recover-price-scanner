<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recover — Price Scanner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2e3350; --accent: #4f8ef7; --accent-hover: #6da3ff;
      --text: #e8eaf0; --muted: #8890aa; --danger: #f56565;
      --success: #48bb78; --warn: #ed8936; --radius: 10px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 1100px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2rem; }
    header .brand { font-size: 9px; letter-spacing: 6px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    header h1 { font-size: 2rem; font-weight: 700; color: var(--text); }
    header p { margin-top: 0.5rem; color: var(--muted); font-size: 0.9rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 1rem; }
    .selector-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; }
    label.field { display: flex; flex-direction: column; gap: 0.35rem; }
    label.field span { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    select, input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.95rem; padding: 0.6rem 0.85rem; outline: none; transition: border-color 0.2s; width: 100%; }
    select:focus, input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    input.mono { font-family: "Courier New", monospace; letter-spacing: 1px; font-size: 1rem; }
    input.asin-found { border-color: var(--success); }
    input.asin-missing { border-color: var(--warn); }
    .asin-status { font-size: 0.75rem; margin-top: 0.25rem; }
    .asin-status.found { color: var(--success); }
    .asin-status.missing { color: var(--warn); }
    .search-row { display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; margin-top: 1rem; }
    button.btn { background: var(--accent); border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 0.95rem; font-weight: 600; padding: 0.65rem 2rem; transition: background 0.2s; white-space: nowrap; }
    button.btn:hover { background: var(--accent-hover); }
    button.btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #result { display: none; }
    .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .product-header { display: flex; gap: 1.25rem; padding: 1.5rem; border-bottom: 1px solid var(--border); align-items: flex-start; }
    .product-image { width: 90px; height: 90px; object-fit: contain; border-radius: 8px; background: var(--surface2); flex-shrink: 0; }
    .product-placeholder { width: 90px; height: 90px; background: var(--surface2); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 2rem; flex-shrink: 0; }
    .product-meta h2 { font-size: 1.05rem; font-weight: 600; line-height: 1.4; margin-bottom: 0.5rem; }
    .asin-badge { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--muted); font-family: "Courier New", monospace; font-size: 0.78rem; padding: 0.2rem 0.5rem; margin-right: 0.4rem; }
    .markets-table-wrap { overflow-x: auto; }
    table.markets-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    table.markets-table thead tr { border-bottom: 2px solid var(--border); }
    table.markets-table th { padding: 0.75rem 0.85rem; text-align: left; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); white-space: nowrap; }
    table.markets-table td { padding: 0.85rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    table.markets-table tbody tr:last-child td { border-bottom: none; }
    table.markets-table tbody tr:hover { background: var(--surface2); }
    .market-cell { display: flex; align-items: center; gap: 0.55rem; font-weight: 600; white-space: nowrap; font-size: 0.85rem; }
    .market-flag { font-size: 1.2rem; }
    .price-val { font-size: 1rem; font-weight: 700; }
    .price-val.highlight { color: var(--success); }
    .price-val.na { color: var(--muted); font-size: 0.82rem; font-weight: 400; }
    .seller-line { font-size: 0.7rem; color: var(--muted); margin-top: 3px; font-weight: 400; }
    .best-badge { display: inline-block; background: rgba(72,187,120,0.15); border: 1px solid rgba(72,187,120,0.3); border-radius: 4px; color: var(--success); font-size: 0.6rem; font-weight: 700; padding: 1px 5px; margin-left: 5px; text-transform: uppercase; vertical-align: middle; }
    .opp-badge { display: inline-block; background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.35); border-radius: 4px; color: #f59e0b; font-size: 0.6rem; font-weight: 700; padding: 1px 5px; text-transform: uppercase; }
    .view-link { color: var(--accent); text-decoration: none; font-size: 0.82rem; white-space: nowrap; }
    .view-link:hover { color: var(--accent-hover); }
    .scanning-cell { color: var(--muted); font-size: 0.82rem; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .mkt-checkbox-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .mkt-checkbox-row > span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
    .mkt-checkbox-row label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text); cursor: pointer; user-select: none; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); }
    .mkt-checkbox-row label input { width: auto; padding: 0; margin: 0; accent-color: var(--accent); }
    .token-info { padding: 0.75rem 1rem; border-top: 1px solid var(--border); font-size: 0.78rem; color: var(--muted); text-align: right; }
    /* nuovi stili per Featured + MIN reale */
    .price-block { display: flex; flex-direction: column; gap: 4px; }
    .price-line { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
    .price-tag { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; padding: 1px 5px; border-radius: 3px; background: var(--surface2); }
    .price-tag.featured { color: #4f8ef7; background: rgba(79,142,247,0.12); }
    .price-tag.min { color: var(--warn); background: rgba(237,137,54,0.15); }
    .feedback-badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 9px; font-weight: 700; margin-left: 4px; }
    .feedback-badge.good { background: rgba(72,187,120,0.15); color: var(--success); }
    .feedback-badge.mid { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .feedback-badge.bad { background: rgba(245,101,101,0.15); color: var(--danger); }
    .price-divider { height: 1px; background: var(--border); margin: 4px 0; }
    .recover-line { font-size: 10px; color: var(--accent); margin-top: 4px; font-weight: 600; }
    @media (max-width: 700px) {
      .selector-grid { grid-template-columns: 1fr 1fr; }
      .product-header { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="container">

  </header>

  <div style="display:flex;gap:8px;margin-bottom:16px;">

  <div id="amazon-section">
    <div class="card">

            <option>SE</option><option>12</option><option>13</option>

          </select>

          <select id="sel-model" onchange="updateStorage()" disabled><option value="">— Modello —</option></select>
        </label>
        <label class="field"><span>Storage</span>
          <select id="sel-storage" onchange="updateColors()" disabled><option value="">— Storage —</option></select>
        </label>
        <label class="field"><span>Colore</span>

      <div class="search-row">

<script>
function showMainTab(tab) {
  document.getElementById('amazon-section').style.display = tab==='amazon' ? 'block' : 'none';
  document.getElementById('bm-section').style.display = tab==='backmarket' ? 'block' : 'none';
  document.getElementById('report-section').style.display = tab==='report' ? 'block' : 'none';
  ['amazon','bm','report'].forEach(t => {
    const id = t==='amazon' ? 'tab-amazon' : t==='bm' ? 'tab-bm' : 'tab-report';
    const active = (t==='amazon'&&tab==='amazon')||(t==='bm'&&tab==='backmarket')||(t==='report'&&tab==='report');
    const el = document.getElementById(id);
    el.style.borderColor = active ? '#4f8ef7' : '#2e3350';
    el.style.background = active ? 'rgba(79,142,247,0.15)' : 'transparent';
    el.style.color = active ? '#4f8ef7' : '#8890aa';
  });
}

// ─── BACK MARKET (invariato) ─────────────────────────────────────────────────
let bmData = null;
const BM_FLAGS = {it:'🇮🇹',fr:'🇫🇷',de:'🇩🇪',es:'🇪🇸',nl:'🇳🇱'};
const BM_COUNTRIES = ['it','fr','de','es','nl'];
const GRADE_LABELS = {EXCELLENT:'Eccellente',VERY_GOOD:'Molto buono',GOOD:'Buono'};

async function loadBMData() {
  const btn = document.getElementById('bm-load-btn');
  const status = document.getElementById('bm-status');
  btn.textContent = '⟳ Caricamento...'; btn.disabled = true;
  status.textContent = 'Recupero dati da IT, FR, DE, ES, NL...';
  try {
    const r = await fetch('/api/backmarket/all');
    const data = await r.json();
    bmData = data;
    const products = {};
    for (const country of BM_COUNTRIES) {
      const countryListings = data[country]?.data?.results || data[country] || [];
      for (const listing of countryListings) {
        const bid = listing.backmarket_id;
        if (!bid) continue;
        if (!products[bid]) products[bid] = { sku: listing.sku, title: listing.title, grade: listing.grade, countries: {} };
        products[bid].countries[country] = { price: listing.price, min_price: listing.min_price, max_price: listing.max_price, state: listing.publication_state };
      }
    }
    bmData._products = products;
    renderBMTable(products);
    status.textContent = `✓ ${Object.keys(products).length} prodotti caricati`;
  } catch(e) {
    status.textContent = 'Errore: ' + e.message;
  }
  btn.textContent = '⟳ Aggiorna'; btn.disabled = false;
}

function filterBM() {
  if (!bmData?._products) return;
  const q = document.getElementById('bm-search').value.toLowerCase().trim();
  const filtered = {};
  for (const [bid, p] of Object.entries(bmData._products)) {
    if (!q || p.sku?.toLowerCase().includes(q) || p.title?.toLowerCase().includes(q)) filtered[bid] = p;
  }
  renderBMTable(filtered);
}

function renderBMTable(products) {
  const wrap = document.getElementById('bm-table-wrap');
  const entries = Object.entries(products);
  if (!entries.length) { wrap.innerHTML = '<div style="text-align:center;padding:40px;color:#8890aa;">Nessun risultato</div>'; return; }
  const rows = entries.map(([bid, p]) => {
    const cCells = BM_COUNTRIES.map(c => {
      const d = p.countries[c];
      if (!d) return `<td style="padding:7px 10px;color:#2e3350;text-align:center;">—</td>`;
      const price = d.price ? '€'+parseFloat(d.price).toFixed(0) : '—';
      const bb = d.max_price ? '€'+d.max_price : '—';
      const isActive = d.state === 3;
      return `<td style="padding:7px 10px;text-align:center;">
        <div style="font-size:12px;font-weight:700;color:${isActive?'#48bb78':'#8890aa'}">${price}</div>
        <div style="font-size:9px;color:#4f8ef7;">BB: ${bb}</div></td>`;
    }).join('');
    return `<tr style="border-bottom:1px solid rgba(46,51,80,0.5);">
      <td style="padding:7px 10px;">
        <div style="font-size:11px;font-weight:600;color:#e8eaf0;">${p.sku||'—'}</div>
        <div style="font-size:9px;color:#8890aa;margin-top:1px;">${GRADE_LABELS[p.grade]||p.grade} · BM#${bid}</div>
      </td>${cCells}</tr>`;
  }).join('');
  wrap.innerHTML = `<div style="background:#1a1d27;border:1px solid #2e3350;border-radius:10px;overflow:hidden;">
    <div style="overflow-x:auto;max-height:60vh;overflow-y:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:11px;">
        <thead style="position:sticky;top:0;background:#1a1d27;">
          <tr style="border-bottom:2px solid #2e3350;">
            <th style="padding:8px 10px;text-align:left;font-size:9px;color:#8890aa;text-transform:uppercase;letter-spacing:1px;">Prodotto</th>
            ${BM_COUNTRIES.map(c=>`<th style="padding:8px 10px;text-align:center;font-size:12px;">${BM_FLAGS[c]}</th>`).join('')}
          </tr>
        </thead><tbody>${rows}</tbody></table></div></div>`;
}
</script>

// Margine netto IVA a margine Art.36 - Recover (Amazon)
function calcMargin(buyPrice, sellPrice) {
  if (!buyPrice || !sellPrice || sellPrice <= 0) return null;
  const commission = sellPrice * 0.073 + 15;
  const ivaMargin = (sellPrice - buyPrice) * 22 / 122;
  return sellPrice - buyPrice - commission - ivaMargin;
}
function fmtMargin(net) {
  if (net === null) return '<span class="price-val na">—</span>';
  const color = net >= 0 ? 'var(--success)' : 'var(--danger)';
  return `<span style="font-weight:700;color:${color}">€${net.toFixed(0)}</span>`;
}

// Badge feedback seller (basato su % positive)
function feedbackBadge(pct) {
  if (pct === null || pct === undefined) return '';
  let cls = 'bad';
  if (pct >= 90) cls = 'good';
  else if (pct >= 70) cls = 'mid';
  return `<span class="feedback-badge ${cls}">${pct}%</span>`;
}

// Render cella Buy Box (Featured ufficiale Amazon, prezzo + seller + badge FBA)
function buildBuyBoxCell(data) {
  const featured = data.excellent;
  if (!featured || !featured.available || !featured.price) {
    return `<div class="price-block">
      <span class="price-val na" style="font-size:0.85rem;">— Assente</span>
      <div class="seller-line" style="color:#8890aa;font-size:9px;">Nessuna Buy Box Eccellente</div>
    </div>`;
  }
  const fbaBadge = featured.isFBA
    ? '<span style="display:inline-block;background:rgba(79,142,247,0.18);color:#4f8ef7;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:middle;letter-spacing:0.3px;">PRIME FBA</span>'
    : '';
  return `<div class="price-block">
    <span class="price-val">€${featured.price.toFixed(2)}</span>${fbaBadge}
    <div class="seller-line">${featured.seller || '?'}</div>
  </div>`;
}

// Render cella Eccellente: MIN reale + spedizione + apparente + Recover position
function buildExcellentCell(data) {
  const minReal = data.excellentMinReal;
  const recover = data.recoverPosition;
  const hasMinReal = minReal && minReal.available && minReal.totalPrice;

  let html = '<div class="price-block">';

  if (hasMinReal) {
    const minTotal = minReal.totalPrice;
    html += `<div class="price-line">
      <span class="price-val" data-val="${minTotal}">€${minTotal.toFixed(2)}</span>
      ${feedbackBadge(minReal.positivePercent)}
    </div>
    <div class="seller-line">${minReal.seller || '?'} · ${minReal.count} offert${minReal.count===1?'a':'e'}</div>`;

    // Spedizione: se gratuita riga semplice verde, se a pagamento riquadro con dettaglio calcolo
    if (minReal.deliveryFee === 0) {
      html += '<div style="font-size:10px;color:#48bb78;margin-top:2px;">📦 Spedizione gratuita</div>';
    } else if (minReal.deliveryFee > 0) {
      html += `<div style="margin-top:6px;padding:5px 7px;background:rgba(245,158,11,0.08);border-left:2px solid #f59e0b;border-radius:3px;font-size:10px;line-height:1.4;">
        <div style="color:#f59e0b;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:0.4px;">📦 Prezzo con spedizione</div>
        <div style="color:#e8eaf0;margin-top:2px;">€${minReal.price.toFixed(2)} + €${minReal.deliveryFee.toFixed(2)} sped. = <strong>€${minReal.totalPrice.toFixed(2)}</strong></div>
        <div style="color:#8890aa;font-size:9px;">${minReal.seller || '?'} ${feedbackBadge(minReal.positivePercent)}</div>
      </div>`;
    }
  } else {
    html += `<span class="price-val na">—</span>
    <div class="seller-line"><span class="opp-badge">Nessuna offerta Eccellente</span></div>`;
  }

  // Warning MIN apparente
  if (hasMinReal && minReal.apparentMin) {
    const app = minReal.apparentMin;
    html += `<div style="margin-top:6px;padding:5px 7px;background:rgba(245,158,11,0.08);border-left:2px solid #f59e0b;border-radius:3px;font-size:10px;line-height:1.4;">
      <div style="color:#f59e0b;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:0.4px;">⚠ Apparente più basso</div>
      <div style="color:#e8eaf0;margin-top:2px;">€${app.price.toFixed(2)} + €${app.deliveryFee.toFixed(2)} sped. = <strong>€${app.totalPrice.toFixed(2)}</strong></div>
      <div style="color:#8890aa;font-size:9px;">${app.seller || '?'} ${feedbackBadge(app.positivePercent)}</div>
    </div>`;
  }

  // Box Recover con suggerimento prezzo
  if (recover && recover.inList) {
    if (recover.isLowest && recover.ceilingPrice !== null) {
      // Caso 1: Recover è il più basso, c'è un prossimo competitor → suggerimento alza
      html += `<div style="margin-top:8px;padding:8px 10px;background:rgba(72,187,120,0.10);border-left:3px solid #48bb78;border-radius:4px;font-size:11px;line-height:1.6;">
        <div style="color:#48bb78;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;">🎯 Recover è il più basso</div>
        <div style="display:flex;justify-content:space-between;color:#e8eaf0;">
          <span>Tuo prezzo:</span><strong>€${recover.price.toFixed(2)}</strong>
        </div>
        <div style="display:flex;justify-content:space-between;color:#e8eaf0;">
          <span>Prossimo (${recover.nextSeller || '?'}):</span><strong>€${recover.nextPrice.toFixed(2)}</strong>
        </div>
        <div style="margin-top:6px;padding-top:5px;border-top:1px solid rgba(72,187,120,0.3);color:#48bb78;font-weight:700;">
          ↗ Alza fino a €${recover.ceilingPrice.toFixed(2)} (+€${recover.priceGain.toFixed(2)})
        </div>
      </div>`;
    } else if (recover.isLowest) {
      // Caso 2: Recover unico Excellent, nessun competitor
      html += `<div style="margin-top:8px;padding:8px 10px;background:rgba(72,187,120,0.10);border-left:3px solid #48bb78;border-radius:4px;font-size:11px;line-height:1.5;">
        <div style="color:#48bb78;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:0.5px;">🎯 Recover unico Eccellente</div>
        <div style="color:#e8eaf0;margin-top:3px;">Tuo prezzo: <strong>€${recover.price.toFixed(2)}</strong> · Nessun competitor Eccellente · libertà di pricing</div>
      </div>`;
    } else if (recover.tiedLowest) {
      // Caso 2-bis: Recover è il più basso ma ALLA PARI con un competitor → già competitivo, non alzare
      html += `<div style="margin-top:8px;padding:8px 10px;background:rgba(72,187,120,0.10);border-left:3px solid #48bb78;border-radius:4px;font-size:11px;line-height:1.6;">
        <div style="color:#48bb78;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;">🎯 Recover è il più basso (alla pari)</div>
        <div style="display:flex;justify-content:space-between;color:#e8eaf0;">
          <span>Tuo prezzo:</span><strong>€${recover.price.toFixed(2)}</strong>
        </div>
        <div style="display:flex;justify-content:space-between;color:#e8eaf0;">
          <span>Stesso prezzo (${recover.tiedSeller || '?'}):</span><strong>€${recover.nextPrice.toFixed(2)}</strong>
        </div>
        <div style="margin-top:6px;padding-top:5px;border-top:1px solid rgba(72,187,120,0.3);color:#48bb78;font-weight:700;">
          ✓ Già competitivo — non alzare
        </div>
      </div>`;
    } else {
      // Caso 3: Recover in lista ma non è il #1
      html += `<div style="margin-top:8px;padding:8px 10px;background:rgba(245,158,11,0.10);border-left:3px solid #f59e0b;border-radius:4px;font-size:11px;line-height:1.5;">
        <div style="color:#f59e0b;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:0.5px;">📌 Recover #${recover.rank}</div>
        <div style="color:#e8eaf0;margin-top:3px;">Tuo prezzo: <strong>€${recover.price.toFixed(2)}</strong> (${recover.condition})</div>
      </div>`;
    }
  }

  html += '</div>';
  return html;
}

// ─── AMAZON SCAN (singolo ASIN, tutti i mercati) ─────────────────────────────
async function fetchScanASIN(asin, domain) {
  const r = await fetch(`/api/scan-asin?asin=${encodeURIComponent(asin)}&domain=${domain}`);
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
  if (d.error) throw new Error(d.error);
  return d;
}

async function doSearch() {
  const asin=document.getElementById("asin-input").value.trim().toUpperCase();
  const btn=document.getElementById("search-btn");
  const lbl=document.getElementById("btn-label");
  const spin=document.getElementById("spinner");
  const result=document.getElementById("result");
  if (!asin) { alert("Inserisci un ASIN"); return; }

  const s=document.getElementById("sel-series").value, m=document.getElementById("sel-model").value;
  const st=document.getElementById("sel-storage").value, c=document.getElementById("sel-color").value;
  const row=CATALOG.find(r=>r[0]===s&&r[1]===m&&r[2]===st&&r[3]===c);

  btn.disabled=true; lbl.style.display="none"; spin.style.display="block";
  result.style.display="none"; result.innerHTML="";

  const tableRows = MARKETS.map(mkt=>{
    const mktAsin = row ? (row[mkt.idx]||asin) : asin;
    return `<tr id="row-${mkt.id}">
      <td><div class="market-cell"><span class="market-flag">${mkt.flag}</span>${mkt.name}</div></td>
      <td><span class="scanning-cell">⟳ ...</span></td>
      <td><span class="scanning-cell">⟳ ...</span></td>
      <td><span class="scanning-cell">⟳ ...</span></td>
      <td><span class="scanning-cell">⟳ ...</span></td>
      <td>
        <a class="view-link" href="${mkt.url}${mktAsin}" target="_blank">Apri ↗</a>
        <div style="font-size:9px;color:#8890aa;margin-top:3px;">CAP locale: <strong style="color:#e8eaf0;">${mkt.zip}</strong></div>
      </td>
    </tr>`;
  }).join("");

  result.innerHTML = `<div class="product-card">
    <div class="product-header">
      <div class="product-placeholder">📦</div>
      <div class="product-meta"><h2 id="product-title">Ricerca in corso...</h2><span class="asin-badge" id="product-asin">${asin}</span></div>
    </div>
    <div class="markets-table-wrap">
      <table class="markets-table">
        <thead><tr>
          <th>Mercato</th><th>Vendite/mese</th><th>Buy Box</th><th>Eccellente</th><th>Margine netto</th><th>Link</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    <div class="token-info">Buy Box = offerta principale Amazon (Featured). Eccellente = MIN reale tra tutte le offerte Eccellenti. Margine calcolato sul MIN reale con IVA a margine Art.36.</div>
  </div>`;
  result.style.display="block";

  let title=null;
  const excellentVals=[];

  for (let i=0;i<MARKETS.length;i++) {
    const mkt=MARKETS[i];
    const mktAsin=row?(row[mkt.idx]||asin):asin;
    const rowEl=document.getElementById(`row-${mkt.id}`);

    if (!mktAsin) {
      rowEl.innerHTML = `
        <td><div class="market-cell"><span class="market-flag">${mkt.flag}</span>${mkt.name}</div></td>
        <td colspan="4"><span class="price-val na">ASIN non disponibile</span></td>
        <td>—</td>`;
      continue;
    }

    try {
      const data = await fetchScanASIN(mktAsin, mkt.domain);

      if (!title && data.title) {
        title = data.title;
        document.getElementById("product-title").textContent = title;
      }

      const bsr = data.salesRank;
      let monthlyStr;
      if (bsr !== null && bsr !== undefined && bsr > 0) {
        // Mostra sempre il BSR (Best Seller Rank) come indicatore di popolarità uniforme
        const bsrColor = bsr <= 10 ? '#48bb78' : bsr <= 50 ? '#f59e0b' : '#8890aa';
        monthlyStr = `<span style="font-size:13px;font-weight:700;color:${bsrColor};">BSR #${bsr.toLocaleString('it-IT')}</span><div class="seller-line">in Renewed</div>`;
      } else {
        monthlyStr = '<span class="price-val na">—</span>';
      }

      const buyBoxCell = buildBuyBoxCell(data);
      const excellentCell = buildExcellentCell(data);

      // Per il margine: usa MIN reale TOTALE (prezzo + spedizione) se c'è, altrimenti Featured
      const minRealTotal = data.excellentMinReal && data.excellentMinReal.available ? data.excellentMinReal.totalPrice : null;
      const featuredPrice = data.excellent && data.excellent.available ? data.excellent.price : null;
      const sellPrice = minRealTotal || featuredPrice;

      if (sellPrice) excellentVals.push({mkt, val: sellPrice});

      const buyPrice = parseFloat(document.getElementById("buy-price").value)||0;
      const marginCell = fmtMargin(calcMargin(buyPrice, sellPrice));

      rowEl.innerHTML=`
        <td><div class="market-cell"><span class="market-flag">${mkt.flag}</span>${mkt.name}</div></td>
        <td>${monthlyStr}</td>
        <td>${buyBoxCell}</td>
        <td>${excellentCell}</td>
        <td>${marginCell}</td>
        <td>
          <a class="view-link" href="${mkt.url}${mktAsin}" target="_blank">Apri ↗</a>
          <div style="font-size:9px;color:#8890aa;margin-top:3px;">CAP locale: <strong style="color:#e8eaf0;">${mkt.zip}</strong></div>
        </td>`;

    } catch(e) {
      rowEl.innerHTML=`
        <td><div class="market-cell"><span class="market-flag">${mkt.flag}</span>${mkt.name}</div></td>
        <td colspan="4"><span class="price-val na">${e.message||"Errore"}</span></td>
        <td>
          <a class="view-link" href="${mkt.url}${mktAsin}" target="_blank">Apri ↗</a>
          <div style="font-size:9px;color:#8890aa;margin-top:3px;">CAP locale: <strong style="color:#e8eaf0;">${mkt.zip}</strong></div>
        </td>`;
    }

    if (i<MARKETS.length-1) await new Promise(r=>setTimeout(r,400));
  }

  // Highlight mercato con prezzo Eccellente più alto (= vendi qui)
  if (excellentVals.length) {
    const maxVal = Math.max(...excellentVals.map(x=>x.val));
    document.querySelectorAll("table.markets-table tbody tr td .price-val[data-val]").forEach(el=>{
      const v = parseFloat(el.getAttribute("data-val"));
      if (v === maxVal) {
        el.classList.add("highlight");
        el.innerHTML += `<span class="best-badge">↑ Vendi qui</span>`;
      }
    });
  }

  btn.disabled=false; lbl.style.display="inline"; spin.style.display="none";
}

function getCatalogRowsForModel(modello) {
  const m = modello.toLowerCase();
  return CATALOG.filter(row => `${row[1]} ${row[2]}`.toLowerCase() === m);
}

function buildSupplierItems() {
  const items = [];
  for (const s of SUPPLIER_NL) {
    const rows = getCatalogRowsForModel(s.modello);
    if (!rows.length) {
      items.push({modello:s.modello,colore:'—',prezzo_acquisto:s.prezzo_acquisto,asin_it:'',asin_de:'',asin_fr:'',asin_es:'',markets:{}});
    } else {
      for (const row of rows) {
        items.push({modello:s.modello,colore:row[3],prezzo_acquisto:s.prezzo_acquisto,asin_it:row[4]||'',asin_de:row[5]||'',asin_fr:row[6]||'',asin_es:row[7]||'',markets:{}});
      }
    }
  }
  return items;
}

let allReportData = [];

function getActiveMarkets() {
  return MARKETS.filter(m => document.getElementById('mkt-'+m.id).checked);
}

function updateEstimate() {
  const data = allReportData.length ? allReportData : buildSupplierItems();
  const active = getActiveMarkets();
  let count = 0;
  for (const r of data) for (const mkt of active) if (r['asin_'+mkt.id.toLowerCase()]) count++;
  document.getElementById('report-estimate').textContent = count
    ? `≈ ${count} chiamate SerpApi (~${Math.round(count/5000*100)}% budget mensile)`
    : '';
}

function filterReport() {
  const q = document.getElementById('report-search').value.toLowerCase();
  renderReportTable(allReportData.filter(r => !q || r.modello.toLowerCase().includes(q) || (r.colore||'').toLowerCase().includes(q)));
}

function renderReportTable(data) {
  const wrap = document.getElementById('report-table-wrap');
  if (!data.length) { wrap.innerHTML = '<div style="text-align:center;padding:40px;color:#8890aa;">Nessun dato — clicca "Avvia scansione prezzi"</div>'; return; }

  const active = getActiveMarkets();

  let lastModello = '';
  const rows = data.map(r => {
    const isNewModello = r.modello !== lastModello;
    lastModello = r.modello;

    const mktCells = active.map(mkt => {
      const d = r.markets?.[mkt.id];
      const asinKey = 'asin_'+mkt.id.toLowerCase();
      if (!r[asinKey]) return `<td colspan="2" style="padding:5px 8px;text-align:center;font-size:10px;color:#2e3350;">—</td>`;
      if (!d) return `<td style="padding:5px 8px;text-align:center;font-size:10px;color:#8890aa;">...</td><td style="padding:5px 8px;text-align:center;font-size:10px;color:#8890aa;">...</td>`;
      if (d.error) return `<td colspan="2" style="padding:5px 8px;text-align:center;font-size:9px;color:#f56565;">${d.error}</td>`;
      const exStr = d.excellent !== null && d.excellent !== undefined ? `€${d.excellent.toFixed(0)}` : '<span style="color:#f59e0b;">∅</span>';
      const net = (d.excellent !== null && d.excellent !== undefined) ? calcMargin(r.prezzo_acquisto, d.excellent) : null;
      const netColor = net === null ? '#8890aa' : net > 30 ? '#48bb78' : net > 0 ? '#f59e0b' : '#f56565';
      const netStr = net !== null ? `€${net.toFixed(0)}` : '—';
      return `<td style="padding:5px 8px;text-align:center;font-size:10px;color:#e8eaf0;">${exStr}</td><td style="padding:5px 8px;text-align:center;font-size:10px;font-weight:700;color:${netColor};">${netStr}</td>`;
    }).join('');

    const modelloCell = isNewModello
      ? `<td style="padding:5px 8px;font-size:11px;font-weight:700;color:#e8eaf0;border-right:1px solid #2e3350;">${r.modello}</td>`
      : `<td style="padding:5px 8px;font-size:11px;color:#8890aa;border-right:1px solid #2e3350;"></td>`;

    const rowBg = isNewModello ? 'rgba(79,142,247,0.04)' : 'transparent';

    return `<tr style="border-bottom:1px solid rgba(46,51,80,0.3);background:${rowBg};">
      ${modelloCell}
      <td style="padding:5px 8px;font-size:10px;color:#8890aa;">${r.colore}</td>
      <td style="padding:5px 8px;text-align:center;font-size:10px;color:#4f8ef7;font-weight:700;">€${r.prezzo_acquisto}</td>
      ${mktCells}
    </tr>`;
  }).join('');

  const mktHeaders = active.map(m => `<th colspan="2" style="padding:8px;text-align:center;font-size:9px;color:#8890aa;text-transform:uppercase;">${m.flag} ${m.id}</th>`).join('');
  const mktSubHeaders = active.map(() => '<th style="padding:3px 8px;text-align:center;font-size:8px;color:#64748b;">Eccellente</th><th style="padding:3px 8px;text-align:center;font-size:8px;color:#64748b;">Margine</th>').join('');

  wrap.innerHTML = `<div style="background:#1a1d27;border:1px solid #2e3350;border-radius:10px;overflow:hidden;">
    <div style="overflow-x:auto;max-height:65vh;overflow-y:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:10px;">
        <thead style="position:sticky;top:0;background:#1a1d27;z-index:1;">
          <tr style="border-bottom:2px solid #2e3350;">
            <th style="padding:8px;text-align:left;font-size:9px;color:#8890aa;text-transform:uppercase;min-width:160px;">Modello</th>
            <th style="padding:8px;text-align:left;font-size:9px;color:#8890aa;text-transform:uppercase;">Colore</th>
            <th style="padding:8px;text-align:center;font-size:9px;color:#8890aa;text-transform:uppercase;">Acquisto</th>
            ${mktHeaders}
          </tr>
          <tr style="border-bottom:1px solid #2e3350;">
            <th></th><th></th><th></th>
            ${mktSubHeaders}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

async function runReport() {
  const btn = document.getElementById('report-btn');
  const status = document.getElementById('report-status');
  const active = getActiveMarkets();
  if (!active.length) { alert('Seleziona almeno un mercato'); return; }

  btn.disabled = true; btn.textContent = '⟳ Scansione in corso...';
  allReportData = buildSupplierItems();
  renderReportTable(allReportData);

  const flatItems = [];
  for (let rowIdx = 0; rowIdx < allReportData.length; rowIdx++) {
    const r = allReportData[rowIdx];
    for (const mkt of active) {
      const asin = r['asin_'+mkt.id.toLowerCase()];
      if (asin) flatItems.push({ rowIdx, market: mkt.id, asin, domain: Number(mkt.domain) });
    }
  }

  const total = flatItems.length;
  let done = 0;
  status.textContent = `Pronto: ${total} chiamate da fare su ${active.length} mercati`;

  const batchSize = 6;
  for (let i = 0; i < flatItems.length; i += batchSize) {
    const slice = flatItems.slice(i, i + batchSize);
    try {
      const r = await fetch('/api/bulk-scan', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ items: slice.map(it => ({ asin: it.asin, domain: it.domain })) })
      });
      const json = await r.json();
      const results = json.results || [];
      for (let j = 0; j < results.length; j++) {
        const res = results[j];
        const meta = slice[j];
        if (!meta) continue;
        const targetRow = allReportData[meta.rowIdx];
        if (!targetRow.markets) targetRow.markets = {};
        if (res.serpapiOk === false && res.keepaOk === false) {
          targetRow.markets[meta.market] = { error: 'err' };
        } else {
          targetRow.markets[meta.market] = {
            excellent: res.excellent?.available ? res.excellent.price : null,
            monthlySold: res.monthlySold ?? null
          };
        }
        done++;
      }
      status.textContent = `Elaborati ${done}/${total} chiamate...`;
      filterReport();
    } catch(e) {
      status.textContent = `Errore: ${e.message}`;
      break;
    }
    if (i + batchSize < flatItems.length) await new Promise(r => setTimeout(r, 700));
  }

  status.textContent = `✓ Completato — ${done}/${total} chiamate eseguite`;
  btn.disabled = false; btn.textContent = '▶ Avvia scansione prezzi';
}

window.addEventListener('DOMContentLoaded', updateEstimate);
