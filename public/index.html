<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recover — Price Scanner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2e3350; --accent: #4f8ef7; --accent-hover: #6da3ff;
      --text: #e8eaf0; --muted: #8890aa; --danger: #f56565;
      --success: #48bb78; --warn: #ed8936; --radius: 10px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 900px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2rem; }
    header .brand { font-size: 9px; letter-spacing: 6px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    header h1 { font-size: 2rem; font-weight: 700; color: var(--text); }
    header p { margin-top: 0.5rem; color: var(--muted); font-size: 0.9rem; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 1rem; }

    .selector-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; }
    label.field { display: flex; flex-direction: column; gap: 0.35rem; }
    label.field span { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    select, input {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 0.95rem; padding: 0.6rem 0.85rem;
      outline: none; transition: border-color 0.2s; width: 100%;
    }
    select:focus, input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    input.mono { font-family: "Courier New", monospace; letter-spacing: 1px; font-size: 1rem; }
    input.asin-found { border-color: var(--success); }
    input.asin-missing { border-color: var(--warn); }
    .asin-status { font-size: 0.75rem; margin-top: 0.25rem; }
    .asin-status.found { color: var(--success); }
    .asin-status.missing { color: var(--warn); }

    .search-row { display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; margin-top: 1rem; }
    button.btn {
      background: var(--accent); border: none; border-radius: 8px;
      color: #fff; cursor: pointer; font-size: 0.95rem; font-weight: 600;
      padding: 0.65rem 2rem; transition: background 0.2s; white-space: nowrap;
    }
    button.btn:hover { background: var(--accent-hover); }
    button.btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #result { display: none; }
    .error-box { background: rgba(245,101,101,0.1); border: 1px solid rgba(245,101,101,0.4); border-radius: var(--radius); color: var(--danger); padding: 1rem 1.25rem; }

    .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .product-header { display: flex; gap: 1.25rem; padding: 1.5rem; border-bottom: 1px solid var(--border); align-items: flex-start; }
    .product-image { width: 90px; height: 90px; object-fit: contain; border-radius: 8px; background: var(--surface2); flex-shrink: 0; }
    .product-placeholder { width: 90px; height: 90px; background: var(--surface2); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 2rem; flex-shrink: 0; }
    .product-meta h2 { font-size: 1.05rem; font-weight: 600; line-height: 1.4; margin-bottom: 0.5rem; }
    .asin-badge { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--muted); font-family: "Courier New", monospace; font-size: 0.78rem; padding: 0.2rem 0.5rem; margin-right: 0.4rem; }

    /* Market comparison table */
    .markets-table-wrap { overflow-x: auto; }
    table.markets-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    table.markets-table thead tr { border-bottom: 2px solid var(--border); }
    table.markets-table th { padding: 0.75rem 1rem; text-align: left; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); white-space: nowrap; }
    table.markets-table td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    table.markets-table tbody tr:last-child td { border-bottom: none; }
    table.markets-table tbody tr:hover { background: var(--surface2); }
    .market-cell { display: flex; align-items: center; gap: 0.6rem; font-weight: 600; white-space: nowrap; }
    .market-flag { font-size: 1.3rem; }
    .price-val { font-size: 1.05rem; font-weight: 700; }
    .price-val.highlight { color: var(--success); }
    .price-val.na { color: var(--muted); font-size: 0.85rem; font-weight: 400; }
    .best-badge { display: inline-block; background: rgba(72,187,120,0.15); border: 1px solid rgba(72,187,120,0.3); border-radius: 4px; color: var(--success); font-size: 0.65rem; font-weight: 700; padding: 1px 6px; margin-left: 6px; text-transform: uppercase; vertical-align: middle; }
    .view-link { color: var(--accent); text-decoration: none; font-size: 0.85rem; white-space: nowrap; }
    .view-link:hover { color: var(--accent-hover); }
    .scanning-cell { color: var(--muted); font-size: 0.85rem; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .section-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); padding: 0.9rem 1rem 0; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0; }
    .stat-cell { padding: 0.9rem 1rem; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .stat-cell:last-child { border-right: none; }
    .stat-label { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 0.3rem; }
    .stat-value { font-size: 1rem; font-weight: 700; color: var(--text); }
    .stat-value.na { color: var(--muted); font-size: 0.85rem; font-weight: 400; }
    .token-info { padding: 0.75rem 1rem; border-top: 1px solid var(--border); font-size: 0.78rem; color: var(--muted); text-align: right; }

    @media (max-width: 600px) {
      .selector-grid { grid-template-columns: 1fr 1fr; }
      .product-header { flex-direction: column; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

<div class="container">
  <header>
    <div class="brand">Recover Srl — Padova · Vicenza</div>
    <h1>📱 Price Scanner</h1>
    <p>Prezzi Amazon ricondizionato · IT · DE · FR · ES</p>
  </header>

  <div class="card">
    <div class="card-title">① Seleziona modello</div>
    <div class="selector-grid">
      <label class="field">
        <span>Serie</span>
        <select id="sel-series" onchange="updateModels()">
          <option value="">— Serie —</option>
          <option>SE</option><option>12</option><option>13</option>
          <option>14</option><option>15</option><option>16</option>
        </select>
      </label>
      <label class="field">
        <span>Modello</span>
        <select id="sel-model" onchange="updateStorage()" disabled>
          <option value="">— Modello —</option>
        </select>
      </label>
      <label class="field">
        <span>Storage</span>
        <select id="sel-storage" onchange="updateColors()" disabled>
          <option value="">— Storage —</option>
        </select>
      </label>
      <label class="field">
        <span>Colore</span>
        <select id="sel-color" onchange="updateASINs()" disabled>
          <option value="">— Colore —</option>
        </select>
      </label>
    </div>

    <div class="search-row">
      <label class="field" style="flex:1;min-width:200px">
        <span>ASIN (oppure inserisci manualmente)</span>
        <input id="asin-input" class="mono" type="text" placeholder="es. B09MJSL8MR" maxlength="10" autocomplete="off" spellcheck="false" oninput="this.value=this.value.toUpperCase()" />
        <div class="asin-status" id="asin-status"></div>
      </label>
      <button class="btn" id="search-btn" onclick="doSearch()">
        <span id="btn-label">Cerca su tutti i mercati</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </div>
  </div>

  <div id="result"></div>
</div>

function unique(arr) { return [...new Set(arr)]; }

function updateModels() {
  const s = document.getElementById("sel-series").value;
  const rows = CATALOG.filter(r=>r[0]===s);
  const sel = document.getElementById("sel-model");
  sel.innerHTML = '<option value="">— Modello —</option>' + unique(rows.map(r=>r[1])).map(m=>`<option>${m}</option>`).join("");
  sel.disabled = false;
  document.getElementById("sel-storage").innerHTML = '<option value="">— Storage —</option>';
  document.getElementById("sel-storage").disabled = true;
  document.getElementById("sel-color").innerHTML = '<option value="">— Colore —</option>';
  document.getElementById("sel-color").disabled = true;
  clearASIN();
}

function updateStorage() {
  const s=document.getElementById("sel-series").value, m=document.getElementById("sel-model").value;
  const rows=CATALOG.filter(r=>r[0]===s&&r[1]===m);

function updateASINs() {
  const s=document.getElementById("sel-series").value, m=document.getElementById("sel-model").value;
  const st=document.getElementById("sel-storage").value, c=document.getElementById("sel-color").value;
  const row=CATALOG.find(r=>r[0]===s&&r[1]===m&&r[2]===st&&r[3]===c);
  const input=document.getElementById("asin-input");
  const status=document.getElementById("asin-status");
  if (row) {
    const asin=row[4]||"";
    input.value=asin;
    if (asin) {
      input.className="mono asin-found";
      status.className="asin-status found";
      status.textContent="✓ ASIN trovato";
    } else {
      input.className="mono asin-missing";
      status.className="asin-status missing";
      status.textContent="⚠ ASIN non ancora inserito";
    }
  } else { clearASIN(); }
}

function clearASIN() {
  document.getElementById("asin-input").value="";
  document.getElementById("asin-input").className="mono";
  document.getElementById("asin-status").textContent="";
}

function formatPrice(cents) {
  if (!cents || cents===-1) return null;
  return "€"+(cents/100).toFixed(2);
}

function latestPrice(ch) {
  if (!ch||ch.length<2) return null;
  for (let i=ch.length-1;i>=0;i-=2) if (ch[i]!==-1) return ch[i];
  return null;
}

function getBestPrice(csv, stats) {
  const buyBox = stats?.buyBoxPrice>0 ? stats.buyBoxPrice : null;
  const refurb = latestPrice(csv[9]);
  const used   = latestPrice(csv[2]);
  const newP   = latestPrice(csv[1]);
  const cands  = [buyBox,refurb,used,newP].filter(v=>v&&v>0);
  return cands.length ? Math.min(...cands) : null;
}

function statCell(label,value,cls="") {
  return `<div class="stat-cell"><div class="stat-label">${label}</div><div class="stat-value ${cls}">${value??'<span class="na">N/D</span>'}</div></div>`;
}

async function fetchMarket(asin, domain) {
  const r=await fetch(`/api/keepa?asin=${encodeURIComponent(asin)}&domain=${encodeURIComponent(domain)}`);
  const d=await r.json();
  if (!r.ok) throw new Error(d.error||`HTTP ${r.status}`);
  return d;
}

async function doSearch() {
  const asin=document.getElementById("asin-input").value.trim().toUpperCase();
  const btn=document.getElementById("search-btn");
  const lbl=document.getElementById("btn-label");
  const spin=document.getElementById("spinner");
  const result=document.getElementById("result");
  if (!asin) { alert("Inserisci un ASIN"); return; }

  // Get ASINs per market from catalog
  const s=document.getElementById("sel-series").value, m=document.getElementById("sel-model").value;
  const st=document.getElementById("sel-storage").value, c=document.getElementById("sel-color").value;
  const row=CATALOG.find(r=>r[0]===s&&r[1]===m&&r[2]===st&&r[3]===c);

  btn.disabled=true; lbl.style.display="none"; spin.style.display="block";
  result.style.display="none"; result.innerHTML="";

  // Show scanning table immediately
  const tableRows = MARKETS.map(mkt=>{
    const mktAsin = row ? (row[mkt.idx]||asin) : asin;
    return `<tr id="row-${mkt.id}">
      <td><div class="market-cell"><span class="market-flag">${mkt.flag}</span>${mkt.name}</div></td>
      <td><span class="scanning-cell">⟳ ricerca in corso...</span></td>
      <td><span class="scanning-cell">...</span></td>
      <td><span class="scanning-cell">...</span></td>
      <td><span class="scanning-cell">...</span></td>
      <td><a class="view-link" href="${mkt.url}${mktAsin}" target="_blank">Apri ↗</a></td>
    </tr>`;
  }).join("");

  result.innerHTML = `<div class="product-card">
    <div class="product-header">
      <div class="product-placeholder">📦</div>
      <div class="product-meta"><h2 id="product-title">Ricerca in corso...</h2><span class="asin-badge" id="product-asin">${asin}</span></div>
    </div>
    <div class="markets-table-wrap">
      <table class="markets-table">
        <thead><tr>
          <th>Mercato</th><th>Prezzo Migliore</th><th>Ricondizionato</th><th>Usato</th><th>Nuovo 3°</th><th>Link</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    <div id="avg-section"></div>
    <div class="token-info" id="token-info"></div>
  </div>`;
  result.style.display="block";

  // Fetch each market sequentially
  let title=null, image=null, lastTokens=null;
  const prices=[];

  for (let i=0;i<MARKETS.length;i++) {
    const mkt=MARKETS[i];
    const mktAsin=row?(row[mkt.idx]||asin):asin;
    const rowEl=document.getElementById(`row-${mkt.id}`);

    try {
      const data=await fetchMarket(mktAsin, mkt.domain);
      const p=data?.products?.[0];
      if (!p) throw new Error("N/D");

      if (!title && p.title) {
        title=p.title;
        document.getElementById("product-title").textContent=title;
        if (p.imagesCSV) {
          const imgSrc=`https://images-na.ssl-images-amazon.com/images/I/${p.imagesCSV.split(",")[0]}`;
          document.querySelector(".product-placeholder").outerHTML=`<img class="product-image" src="${imgSrc}" alt="" onerror="this.style.display='none'" />`;
        }
      }
      if (data.tokensLeft!=null) {
        lastTokens=data.tokensLeft;
        document.getElementById("token-info").textContent=`⬡ Token Keepa rimasti: ${lastTokens}`;
      }

      const csv=p.csv||[];
      const stats=p.stats||{};
      const best=getBestPrice(csv,stats);
      const refurb=latestPrice(csv[9]);
      const used=latestPrice(csv[2]);
      const newP=latestPrice(csv[1]);
      if (best) prices.push(best);

      rowEl.innerHTML=`
        <td><div class="market-cell"><span class="market-flag">${mkt.flag}</span>${mkt.name}</div></td>
        <td><span class="price-val">${formatPrice(best)||'<span class="na">N/D</span>'}</span></td>
        <td><span class="price-val">${formatPrice(refurb)||'<span class="na">—</span>'}</span></td>
        <td><span class="price-val">${formatPrice(used)||'<span class="na">—</span>'}</span></td>
        <td><span class="price-val">${formatPrice(newP)||'<span class="na">—</span>'}</span></td>
        <td><a class="view-link" href="${mkt.url}${mktAsin}" target="_blank">Apri ↗</a></td>`;

    } catch(e) {
      rowEl.innerHTML=`
        <td><div class="market-cell"><span class="market-flag">${mkt.flag}</span>${mkt.name}</div></td>
        <td colspan="4"><span class="price-val na">${e.message||"Errore"}</span></td>
        <td><a class="view-link" href="${mkt.url}${mktAsin}" target="_blank">Apri ↗</a></td>`;
    }

    if (i<MARKETS.length-1) await new Promise(r=>setTimeout(r,1500));
  }

  // Highlight best price
  if (prices.length) {
    const minPrice=Math.min(...prices);
    document.querySelectorAll("table.markets-table tbody tr").forEach(tr=>{
      const priceEl=tr.querySelector(".price-val");
      if (priceEl) {
        const val=parseFloat(priceEl.textContent.replace("€",""));
        if (val===minPrice/100) {
          priceEl.classList.add("highlight");
          priceEl.innerHTML+=`<span class="best-badge">Migliore</span>`;
        }
      }
    });
  }

  btn.disabled=false; lbl.style.display="inline"; spin.style.display="none";
}

document.getElementById("asin-input").addEventListener("keydown", e=>{ if(e.key==="Enter") doSearch(); });
</script>
