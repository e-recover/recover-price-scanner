<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recover — Price Scanner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #4f8ef7;
      --accent-hover: #6da3ff;
      --text: #e8eaf0;
      --muted: #8890aa;
      --danger: #f56565;
      --success: #48bb78;
      --warn: #ed8936;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 820px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 2.5rem; }
    header .brand { font-size: 9px; letter-spacing: 6px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
    header p { margin-top: 0.5rem; color: var(--muted); font-size: 0.95rem; }

    .search-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      margin-bottom: 1.5rem;
    }

    .search-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }

    .input-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .input-group label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    input, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.65rem 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    #asin-input { flex: 1; min-width: 200px; font-family: "Courier New", monospace; font-size: 1rem; letter-spacing: 1px; }
    #domain-select { min-width: 220px; }
    .input-group.asin { flex: 1; }

    button[type="submit"] {
      align-self: flex-end;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.65rem 1.5rem;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    button[type="submit"]:hover { background: var(--accent-hover); }
    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #result { display: none; }

    .error-box {
      background: rgba(245,101,101,0.1);
      border: 1px solid rgba(245,101,101,0.4);
      border-radius: var(--radius);
      color: var(--danger);
      padding: 1rem 1.25rem;
      font-size: 0.9rem;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .product-header {
      display: flex;
      gap: 1.25rem;
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
    }

    .product-image {
      width: 100px; height: 100px;
      object-fit: contain;
      border-radius: 8px;
      background: var(--surface2);
      flex-shrink: 0;
    }

    .product-image-placeholder {
      width: 100px; height: 100px;
      background: var(--surface2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      font-size: 2rem;
      flex-shrink: 0;
    }

    .product-meta h2 { font-size: 1.05rem; font-weight: 600; line-height: 1.4; margin-bottom: 0.5rem; }
    .product-meta .asin-badge {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      font-family: "Courier New", monospace;
      font-size: 0.78rem;
      padding: 0.2rem 0.5rem;
    }

    .amazon-link {
      display: inline-flex; align-items: center; gap: 0.3rem;
      margin-top: 0.5rem;
      color: var(--accent);
      font-size: 0.85rem;
      text-decoration: none;
    }
    .amazon-link:hover { color: var(--accent-hover); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0;
    }

    .stat-cell {
      padding: 1.1rem 1.25rem;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat-cell:last-child { border-right: none; }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .stat-value { font-size: 1.15rem; font-weight: 700; color: var(--text); }
    .stat-value.current { color: var(--accent); }
    .stat-value.low { color: var(--success); }
    .stat-value.high { color: var(--warn); }
    .stat-value.na { color: var(--muted); font-size: 0.9rem; font-weight: 400; }

    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--muted);
      padding: 0.9rem 1.25rem 0;
    }

    .token-info {
      padding: 0.75rem 1.25rem;
      display: flex; gap: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      .search-row { flex-direction: column; }
      button[type="submit"] { width: 100%; }
      .product-header { flex-direction: column; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">Recover Srl — Padova · Vicenza</div>
      <h1>📱 Price Scanner</h1>
      <p>Prezzi Amazon per mercato — powered by Keepa</p>
    </header>

    <div class="search-card">
      <form id="search-form">
        <div class="search-row">
          <div class="input-group asin">
            <label for="asin-input">ASIN</label>
            <input id="asin-input" type="text" placeholder="es. B09MJSL8MR" maxlength="10" autocomplete="off" spellcheck="false" />
          </div>
          <div class="input-group">
            <label for="domain-select">Mercato</label>
            <select id="domain-select">
              <option value="8">🇮🇹 Amazon.it (IT)</option>
              <option value="3">🇩🇪 Amazon.de (DE)</option>
              <option value="4">🇫🇷 Amazon.fr (FR)</option>
              <option value="9">🇪🇸 Amazon.es (ES)</option>
            </select>
          </div>
          <button type="submit" id="search-btn">
            <span id="btn-label">Cerca</span>
            <div class="spinner" id="spinner"></div>
          </button>
        </div>
      </form>
    </div>

    <div id="result"></div>
  </div>

  <script>
    const DOMAIN_URLS = {
      "8": "https://www.amazon.it/dp/",
      "3": "https://www.amazon.de/dp/",
      "4": "https://www.amazon.fr/dp/",
      "9": "https://www.amazon.es/dp/",
    };

    function formatPrice(cents) {
      if (cents == null || cents === -1) return null;
      return "€" + (cents / 100).toFixed(2);
    }

    function latestPrice(channel) {
      if (!channel || channel.length < 2) return null;
      for (let i = channel.length - 1; i >= 0; i -= 2) {
        if (channel[i] !== -1) return channel[i];
      }
      return null;
    }

    function formatDate(keepaTime) {
      if (!keepaTime) return null;
      const ms = (keepaTime + 21564000) * 60000;
      return new Date(ms).toLocaleDateString("it-IT", { year:"numeric", month:"short", day:"numeric" });
    }

    function statCell(label, value, cls="") {
      return `<div class="stat-cell">
        <div class="stat-label">${label}</div>
        <div class="stat-value ${cls}">${value ?? '<span class="na">N/D</span>'}</div>
      </div>`;
    }

    function renderResult(data, domain) {
      const result = document.getElementById("result");

      if (!data.products || data.products.length === 0) {
        result.innerHTML = `<div class="error-box">Nessun prodotto trovato per questo ASIN su questo marketplace.</div>`;
        result.style.display = "block";
        return;
      }

      const p = data.products[0];
      const asin = p.asin || "";
      const title = p.title || "Prodotto sconosciuto";
      const image = p.imagesCSV ? `https://images-na.ssl-images-amazon.com/images/I/${p.imagesCSV.split(",")[0]}` : null;
      const amazonUrl = (DOMAIN_URLS[String(domain)] || DOMAIN_URLS["8"]) + asin;

      const csv = p.csv || [];
      const AMAZON = csv[0];
      const NEW = csv[1];
      const USED = csv[2];
      const REFURB = csv[9];

      const amazonPrice = latestPrice(AMAZON);
      const newPrice = latestPrice(NEW);
      const usedPrice = latestPrice(USED);
      const refurbPrice = latestPrice(REFURB);

      const stats = p.stats || {};
      const buyBox = stats.buyBoxPrice != null && stats.buyBoxPrice !== -1 ? stats.buyBoxPrice : null;

      const cur = String(domain);
      const sections = [];

      sections.push(`
        <div class="section-title">Prezzi Attuali</div>
        <div class="stats-grid">
          ${statCell("Buy Box", buyBox != null ? formatPrice(buyBox) : null, buyBox != null ? "current" : "")}
          ${statCell("Amazon diretto", amazonPrice != null ? formatPrice(amazonPrice) : null, amazonPrice != null ? "current" : "")}
          ${statCell("Ricondizionato", refurbPrice != null ? formatPrice(refurbPrice) : null, refurbPrice != null ? "low" : "")}
          ${statCell("Usato (tutti gradi)", usedPrice != null ? formatPrice(usedPrice) : null)}
          ${statCell("Nuovo (3° parte)", newPrice != null ? formatPrice(newPrice) : null)}
        </div>
      `);

      const avg30  = stats.avg && stats.avg[1] != null && stats.avg[1] !== -1 ? stats.avg[1] : null;
      const avg90  = stats.avg && stats.avg[2] != null && stats.avg[2] !== -1 ? stats.avg[2] : null;
      const avg180 = stats.avg && stats.avg[3] != null && stats.avg[3] !== -1 ? stats.avg[3] : null;
      const atv    = stats.avg && stats.avg[0] != null && stats.avg[0] !== -1 ? stats.avg[0] : null;

      sections.push(`
        <div class="section-title">Medie Storiche (Nuovo)</div>
        <div class="stats-grid">
          ${statCell("30 giorni", avg30  != null ? formatPrice(avg30)  : null)}
          ${statCell("90 giorni", avg90  != null ? formatPrice(avg90)  : null)}
          ${statCell("180 giorni",avg180 != null ? formatPrice(avg180) : null)}
          ${statCell("Sempre",    atv    != null ? formatPrice(atv)    : null)}
        </div>
      `);

      const salesRank = p.salesRanks ? Object.values(p.salesRanks)[0] : null;
      const latestRank = salesRank && salesRank.length >= 2 ? salesRank[salesRank.length - 1] : null;
      const reviewCount = p.reviewCount != null && p.reviewCount !== -1 ? p.reviewCount.toLocaleString("it-IT") : null;
      const rating = p.rating != null && p.rating !== -1 ? (p.rating / 10).toFixed(1) + " / 5" : null;

      sections.push(`
        <div class="section-title">Info Prodotto</div>
        <div class="stats-grid">
          ${statCell("Ranking vendite", latestRank != null ? "#" + latestRank.toLocaleString("it-IT") : null)}
          ${statCell("Recensioni", reviewCount)}
          ${statCell("Valutazione", rating)}
          ${statCell("Token rimasti", data.tokensLeft != null ? data.tokensLeft.toLocaleString() : null)}
        </div>
      `);

      const imageHtml = image
        ? `<img class="product-image" src="${image}" alt="Immagine prodotto" onerror="this.style.display='none'" />`
        : `<div class="product-image-placeholder">📦</div>`;

      result.innerHTML = `
        <div class="product-card">
          <div class="product-header">
            ${imageHtml}
            <div class="product-meta">
              <h2>${title}</h2>
              <div><span class="asin-badge">${asin}</span></div>
              <a class="amazon-link" href="${amazonUrl}" target="_blank" rel="noopener">
                Apri su Amazon ↗
              </a>
            </div>
          </div>
          ${sections.join("")}
        </div>
      `;
      result.style.display = "block";
    }

    document.getElementById("search-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const asin   = document.getElementById("asin-input").value.trim().toUpperCase();
      const domain = document.getElementById("domain-select").value;
      const btn    = document.getElementById("search-btn");
      const label  = document.getElementById("btn-label");
      const spinner = document.getElementById("spinner");
      const result = document.getElementById("result");

      if (!asin) return;

      btn.disabled = true;
      label.style.display = "none";
      spinner.style.display = "block";
      result.style.display = "none";
      result.innerHTML = "";

      try {
        const res = await fetch(`/api/keepa?asin=${encodeURIComponent(asin)}&domain=${encodeURIComponent(domain)}`);
        const data = await res.json();

        if (!res.ok) {
          result.innerHTML = `<div class="error-box">${data.error || "Errore sconosciuto."}</div>`;
          result.style.display = "block";
          return;
        }

        renderResult(data, domain);
      } catch (err) {
        result.innerHTML = `<div class="error-box">Errore di rete.</div>`;
        result.style.display = "block";
      } finally {
        btn.disabled = false;
        label.style.display = "inline";
        spinner.style.display = "none";
      }
    });
  </script>
</body>
</html>
