<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recover — Price Scanner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2e3350; --accent: #4f8ef7; --accent-hover: #6da3ff;
      --text: #e8eaf0; --muted: #8890aa; --danger: #f56565;
      --success: #48bb78; --warn: #ed8936; --radius: 10px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 860px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2rem; }
    header .brand { font-size: 9px; letter-spacing: 6px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    header h1 { font-size: 2rem; font-weight: 700; color: var(--text); }
    header p { margin-top: 0.5rem; color: var(--muted); font-size: 0.9rem; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 1rem; }

    .selector-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; }
    label.field { display: flex; flex-direction: column; gap: 0.35rem; }
    label.field span { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    select, input {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 0.95rem; padding: 0.6rem 0.85rem;
      outline: none; transition: border-color 0.2s; width: 100%;
    }
    select:focus, input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    input.mono { font-family: "Courier New", monospace; letter-spacing: 1px; font-size: 1rem; }
    input.asin-found { border-color: var(--success); }
    input.asin-missing { border-color: var(--warn); }

    .asin-status { font-size: 0.75rem; margin-top: 0.25rem; }
    .asin-status.found { color: var(--success); }
    .asin-status.missing { color: var(--warn); }

    .search-row { display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; }
    .search-row .field { flex: 1; min-width: 200px; }
    .search-row .market-field { min-width: 200px; }

    button.btn {
      background: var(--accent); border: none; border-radius: 8px;
      color: #fff; cursor: pointer; font-size: 0.95rem; font-weight: 600;
      padding: 0.65rem 1.5rem; transition: background 0.2s; white-space: nowrap; align-self: flex-end;
    }
    button.btn:hover { background: var(--accent-hover); }
    button.btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #result { display: none; }
    .error-box { background: rgba(245,101,101,0.1); border: 1px solid rgba(245,101,101,0.4); border-radius: var(--radius); color: var(--danger); padding: 1rem 1.25rem; }

    .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .product-header { display: flex; gap: 1.25rem; padding: 1.5rem; border-bottom: 1px solid var(--border); align-items: flex-start; }
    .product-image { width: 90px; height: 90px; object-fit: contain; border-radius: 8px; background: var(--surface2); flex-shrink: 0; }
    .product-placeholder { width: 90px; height: 90px; background: var(--surface2); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 2rem; flex-shrink: 0; }
    .product-meta h2 { font-size: 1.05rem; font-weight: 600; line-height: 1.4; margin-bottom: 0.5rem; }
    .asin-badge { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--muted); font-family: "Courier New", monospace; font-size: 0.78rem; padding: 0.2rem 0.5rem; }
    .amazon-link { display: inline-flex; align-items: center; gap: 0.3rem; margin-top: 0.5rem; color: var(--accent); font-size: 0.85rem; text-decoration: none; }
    .amazon-link:hover { color: var(--accent-hover); }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0; }
    .stat-cell { padding: 1rem 1.25rem; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .stat-cell:last-child { border-right: none; }
    .stat-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 0.35rem; }
    .stat-value { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .stat-value.current { color: var(--accent); }
    .stat-value.low { color: var(--success); }
    .stat-value.na { color: var(--muted); font-size: 0.9rem; font-weight: 400; }

    .section-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); padding: 0.9rem 1.25rem 0; }
    .token-info { padding: 0.75rem 1.25rem; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--muted); }

    @media (max-width: 600px) {
      .search-row { flex-direction: column; }
      .btn { width: 100%; }
      .product-header { flex-direction: column; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .selector-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="brand">Recover Srl — Padova · Vicenza</div>
    <h1>📱 Price Scanner</h1>
    <p>Prezzi Amazon ricondizionato · IT · DE · FR · ES</p>
  </header>

  <!-- Selettore modello -->
  <div class="card">
    <div class="card-title">① Seleziona modello</div>
    <div class="selector-grid">
      <label class="field">
        <span>Serie</span>
        <select id="sel-series" onchange="updateModels()">
          <option value="">— Serie —</option>
          <option>SE</option><option>12</option><option>13</option>
          <option>14</option><option>15</option><option>16</option>
        </select>
      </label>
      <label class="field">
        <span>Modello</span>
        <select id="sel-model" onchange="updateStorage()" disabled>
          <option value="">— Modello —</option>
        </select>
      </label>
      <label class="field">
        <span>Storage</span>
        <select id="sel-storage" onchange="updateColors()" disabled>
          <option value="">— Storage —</option>
        </select>
      </label>
      <label class="field">
        <span>Colore</span>
        <select id="sel-color" onchange="updateASIN()" disabled>
          <option value="">— Colore —</option>
        </select>
      </label>
    </div>
  </div>

  <!-- ASIN + Mercato + Cerca -->
  <div class="card">
    <div class="card-title">② ASIN e mercato</div>
    <div class="search-row">
      <label class="field" style="flex:1;min-width:180px">
        <span>ASIN</span>
        <input id="asin-input" class="mono" type="text" placeholder="es. B09MJSL8MR" maxlength="10" autocomplete="off" spellcheck="false" oninput="this.value=this.value.toUpperCase()" />
        <div class="asin-status" id="asin-status"></div>
      </label>
      <label class="field market-field">
        <span>Mercato</span>
        <select id="domain-select">
          <option value="8">🇮🇹 Amazon.it (IT)</option>
          <option value="3">🇩🇪 Amazon.de (DE)</option>
          <option value="4">🇫🇷 Amazon.fr (FR)</option>
          <option value="9">🇪🇸 Amazon.es (ES)</option>
        </select>
      </label>
      <button class="btn" id="search-btn" onclick="doSearch()">
        <span id="btn-label">Cerca</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </div>
  </div>

  <div id="result"></div>
</div>

const DOMAIN_URLS = {"8":"https://www.amazon.it/dp/","3":"https://www.amazon.de/dp/","4":"https://www.amazon.fr/dp/","9":"https://www.amazon.es/dp/"};
const DOMAIN_IDX  = {"8":4,"3":5,"4":6,"9":7}; // index in CATALOG row

function unique(arr) { return [...new Set(arr)]; }

function updateModels() {
  const s = document.getElementById("sel-series").value;
  const rows = CATALOG.filter(r => r[0]===s);
  const models = unique(rows.map(r=>r[1]));
  const sel = document.getElementById("sel-model");
  sel.innerHTML = '<option value="">— Modello —</option>' + models.map(m=>`<option>${m}</option>`).join("");
  sel.disabled = false;
  document.getElementById("sel-storage").innerHTML = '<option value="">— Storage —</option>';
  document.getElementById("sel-storage").disabled = true;
  document.getElementById("sel-color").innerHTML = '<option value="">— Colore —</option>';
  document.getElementById("sel-color").disabled = true;
  clearASIN();
}

function updateStorage() {
  const s = document.getElementById("sel-series").value;
  const m = document.getElementById("sel-model").value;
  const rows = CATALOG.filter(r=>r[0]===s && r[1]===m);
  const storages = unique(rows.map(r=>r[2]));
  const sel = document.getElementById("sel-storage");
  sel.innerHTML = '<option value="">— Storage —</option>' + storages.map(x=>`<option>${x}</option>`).join("");
  sel.disabled = false;
  document.getElementById("sel-color").innerHTML = '<option value="">— Colore —</option>';
  document.getElementById("sel-color").disabled = true;
  clearASIN();
}

function updateColors() {
  const s = document.getElementById("sel-series").value;
  const m = document.getElementById("sel-model").value;
  const st = document.getElementById("sel-storage").value;
  const rows = CATALOG.filter(r=>r[0]===s && r[1]===m && r[2]===st);
  const colors = unique(rows.map(r=>r[3]));
  const sel = document.getElementById("sel-color");
  sel.innerHTML = '<option value="">— Colore —</option>' + colors.map(c=>`<option>${c}</option>`).join("");
  sel.disabled = false;
  clearASIN();
}

function updateASIN() {
  const s  = document.getElementById("sel-series").value;
  const m  = document.getElementById("sel-model").value;
  const st = document.getElementById("sel-storage").value;
  const c  = document.getElementById("sel-color").value;
  const domain = document.getElementById("domain-select").value;
  const colIdx = DOMAIN_IDX[domain] || 4;
  const row = CATALOG.find(r=>r[0]===s && r[1]===m && r[2]===st && r[3]===c);
  const input  = document.getElementById("asin-input");
  const status = document.getElementById("asin-status");
  if (row) {
    const asin = row[colIdx] || row[4] || "";
    input.value = asin;
    if (asin) {
      input.className = "mono asin-found";
      status.className = "asin-status found";
      status.textContent = "✓ ASIN trovato nel catalogo";
    } else {
      input.className = "mono asin-missing";
      status.className = "asin-status missing";
      status.textContent = "⚠ ASIN non ancora inserito — inseriscilo manualmente";
    }
  } else {
    clearASIN();
  }
}

function clearASIN() {
  const input = document.getElementById("asin-input");
  input.value = "";
  input.className = "mono";
  document.getElementById("asin-status").textContent = "";
}

// Aggiorna ASIN quando cambia il mercato
document.getElementById("domain-select").addEventListener("change", () => {
  const c = document.getElementById("sel-color").value;
  if (c) updateASIN();
});

// ─── KEEPA LOGIC ──────────────────────────────────────────────────────────────
function formatPrice(cents) {
  if (cents == null || cents === -1) return null;
  return "€" + (cents / 100).toFixed(2);
}

function latestPrice(channel) {
  if (!channel || channel.length < 2) return null;
  for (let i = channel.length - 1; i >= 0; i -= 2) {
    if (channel[i] !== -1) return channel[i];
  }
  return null;
}

function statCell(label, value, cls="") {
  return `<div class="stat-cell"><div class="stat-label">${label}</div><div class="stat-value ${cls}">${value ?? '<span class="na">N/D</span>'}</div></div>`;
}

function renderResult(data, domain) {
  const result = document.getElementById("result");
  if (!data.products || !data.products[0]) {
    result.innerHTML = `<div class="error-box">Nessun prodotto trovato per questo ASIN.</div>`;
    result.style.display = "block";
    return;
  }
  const p = data.products[0];
  const asin = p.asin || "";
  const title = p.title || "Prodotto sconosciuto";
  const image = p.imagesCSV ? `https://images-na.ssl-images-amazon.com/images/I/${p.imagesCSV.split(",")[0]}` : null;
  const amazonUrl = (DOMAIN_URLS[String(domain)]||DOMAIN_URLS["8"]) + asin;
  const csv = p.csv || [];
  const stats = p.stats || {};

  const amazonPrice  = latestPrice(csv[0]);
  const newPrice     = latestPrice(csv[1]);
  const usedPrice    = latestPrice(csv[2]);
  const refurbPrice  = latestPrice(csv[9]);
  const buyBox       = stats.buyBoxPrice > 0 ? stats.buyBoxPrice : null;

  const avg30  = stats.avg?.[1] > 0 ? stats.avg[1] : null;
  const avg90  = stats.avg?.[2] > 0 ? stats.avg[2] : null;
  const avg180 = stats.avg?.[3] > 0 ? stats.avg[3] : null;

  const salesRank = p.salesRanks ? Object.values(p.salesRanks)[0] : null;
  const latestRank = salesRank?.length >= 2 ? salesRank[salesRank.length-1] : null;

  const imgHtml = image
    ? `<img class="product-image" src="${image}" alt="" onerror="this.style.display='none'" />`
    : `<div class="product-placeholder">📦</div>`;

  result.innerHTML = `
    <div class="product-card">
      <div class="product-header">
        ${imgHtml}
        <div class="product-meta">
          <h2>${title}</h2>
          <span class="asin-badge">${asin}</span>
          <a class="amazon-link" href="${amazonUrl}" target="_blank">Apri su Amazon ↗</a>
        </div>
      </div>
      <div class="section-title">Prezzi Attuali</div>
      <div class="stats-grid">
        ${statCell("Buy Box", buyBox ? formatPrice(buyBox) : null, buyBox ? "current" : "")}
        ${statCell("Amazon diretto", amazonPrice ? formatPrice(amazonPrice) : null, amazonPrice ? "current" : "")}
        ${statCell("Ricondizionato", refurbPrice ? formatPrice(refurbPrice) : null, refurbPrice ? "low" : "")}
        ${statCell("Usato (tutti gradi)", usedPrice ? formatPrice(usedPrice) : null)}
        ${statCell("Nuovo (3° parte)", newPrice ? formatPrice(newPrice) : null)}
      </div>
      <div class="section-title">Medie Storiche</div>
      <div class="stats-grid">
        ${statCell("30 giorni", avg30 ? formatPrice(avg30) : null)}
        ${statCell("90 giorni", avg90 ? formatPrice(avg90) : null)}
        ${statCell("180 giorni", avg180 ? formatPrice(avg180) : null)}
        ${statCell("Ranking vendite", latestRank ? "#"+latestRank.toLocaleString("it-IT") : null)}
      </div>
      <div class="token-info">⬡ Token Keepa rimasti: ${data.tokensLeft ?? "N/D"}</div>
    </div>`;
  result.style.display = "block";
}

async function doSearch() {
  const asin   = document.getElementById("asin-input").value.trim().toUpperCase();
  const domain = document.getElementById("domain-select").value;
  const btn    = document.getElementById("search-btn");
  const label  = document.getElementById("btn-label");
  const spin   = document.getElementById("spinner");
  const result = document.getElementById("result");
  if (!asin) { alert("Inserisci un ASIN"); return; }

  btn.disabled = true;
  label.style.display = "none";
  spin.style.display = "block";
  result.style.display = "none";
  result.innerHTML = "";

  try {
    const res  = await fetch(`/api/keepa?asin=${encodeURIComponent(asin)}&domain=${encodeURIComponent(domain)}`);
    const data = await res.json();
    if (!res.ok) {
      result.innerHTML = `<div class="error-box">${data.error||"Errore API"}</div>`;
      result.style.display = "block";
      return;
    }
    renderResult(data, domain);
  } catch(e) {
    result.innerHTML = `<div class="error-box">Errore di rete.</div>`;
    result.style.display = "block";
  } finally {
    btn.disabled = false;
    label.style.display = "inline";
    spin.style.display = "none";
  }
}

// Enter key support
document.getElementById("asin-input").addEventListener("keydown", e => {
  if (e.key === "Enter") doSearch();
});
