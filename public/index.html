<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recover — Price Scanner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2e3350; --accent: #4f8ef7; --accent-hover: #6da3ff;
      --text: #e8eaf0; --muted: #8890aa; --danger: #f56565;
      --success: #48bb78; --warn: #ed8936; --radius: 10px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 900px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2rem; }
    header .brand { font-size: 9px; letter-spacing: 6px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    header h1 { font-size: 2rem; font-weight: 700; color: var(--text); }
    header p { margin-top: 0.5rem; color: var(--muted); font-size: 0.9rem; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 1rem; }

    .selector-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; }
    label.field { display: flex; flex-direction: column; gap: 0.35rem; }
    label.field span { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    select, input {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 0.95rem; padding: 0.6rem 0.85rem;
      outline: none; transition: border-color 0.2s; width: 100%;
    }
    select:focus, input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    input.mono { font-family: "Courier New", monospace; letter-spacing: 1px; font-size: 1rem; }
    input.asin-found { border-color: var(--success); }
    input.asin-missing { border-color: var(--warn); }
    .asin-status { font-size: 0.75rem; margin-top: 0.25rem; }
    .asin-status.found { color: var(--success); }
    .asin-status.missing { color: var(--warn); }

    .search-row { display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; margin-top: 1rem; }
    button.btn {
      background: var(--accent); border: none; border-radius: 8px;
      color: #fff; cursor: pointer; font-size: 0.95rem; font-weight: 600;
      padding: 0.65rem 2rem; transition: background 0.2s; white-space: nowrap;
    }
    button.btn:hover { background: var(--accent-hover); }
    button.btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #result { display: none; }
    .error-box { background: rgba(245,101,101,0.1); border: 1px solid rgba(245,101,101,0.4); border-radius: var(--radius); color: var(--danger); padding: 1rem 1.25rem; }

    .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .product-header { display: flex; gap: 1.25rem; padding: 1.5rem; border-bottom: 1px solid var(--border); align-items: flex-start; }
    .product-image { width: 90px; height: 90px; object-fit: contain; border-radius: 8px; background: var(--surface2); flex-shrink: 0; }
    .product-placeholder { width: 90px; height: 90px; background: var(--surface2); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 2rem; flex-shrink: 0; }
    .product-meta h2 { font-size: 1.05rem; font-weight: 600; line-height: 1.4; margin-bottom: 0.5rem; }
    .asin-badge { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--muted); font-family: "Courier New", monospace; font-size: 0.78rem; padding: 0.2rem 0.5rem; margin-right: 0.4rem; }

    /* Market comparison table */
    .markets-table-wrap { overflow-x: auto; }
    table.markets-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    table.markets-table thead tr { border-bottom: 2px solid var(--border); }
    table.markets-table th { padding: 0.75rem 1rem; text-align: left; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); white-space: nowrap; }
    table.markets-table td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    table.markets-table tbody tr:last-child td { border-bottom: none; }
    table.markets-table tbody tr:hover { background: var(--surface2); }
    .market-cell { display: flex; align-items: center; gap: 0.6rem; font-weight: 600; white-space: nowrap; }
    .market-flag { font-size: 1.3rem; }
    .price-val { font-size: 1.05rem; font-weight: 700; }
    .price-val.highlight { color: var(--success); }
    .price-val.na { color: var(--muted); font-size: 0.85rem; font-weight: 400; }
    .best-badge { display: inline-block; background: rgba(72,187,120,0.15); border: 1px solid rgba(72,187,120,0.3); border-radius: 4px; color: var(--success); font-size: 0.65rem; font-weight: 700; padding: 1px 6px; margin-left: 6px; text-transform: uppercase; vertical-align: middle; }
    .view-link { color: var(--accent); text-decoration: none; font-size: 0.85rem; white-space: nowrap; }
    .view-link:hover { color: var(--accent-hover); }
    .scanning-cell { color: var(--muted); font-size: 0.85rem; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .section-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); padding: 0.9rem 1rem 0; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0; }
    .stat-cell { padding: 0.9rem 1rem; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .stat-cell:last-child { border-right: none; }
    .stat-label { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 0.3rem; }
    .stat-value { font-size: 1rem; font-weight: 700; color: var(--text); }
    .stat-value.na { color: var(--muted); font-size: 0.85rem; font-weight: 400; }
    .token-info { padding: 0.75rem 1rem; border-top: 1px solid var(--border); font-size: 0.78rem; color: var(--muted); text-align: right; }

    @media (max-width: 600px) {
      .selector-grid { grid-template-columns: 1fr 1fr; }
      .product-header { flex-direction: column; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="brand">Recover Srl — Padova · Vicenza</div>
    <h1>📱 Price Scanner</h1>
    <p>Prezzi Amazon · Back Market · IT · DE · FR · ES · NL</p>
  </header>

  <div style="display:flex;gap:8px;margin-bottom:16px;">
    <button onclick="showMainTab('amazon')" id="tab-amazon" style="padding:8px 18px;border-radius:8px;border:1px solid #4f8ef7;background:rgba(79,142,247,0.15);color:#4f8ef7;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;">🛒 Amazon</button>
    <button onclick="showMainTab('backmarket')" id="tab-bm" style="padding:8px 18px;border-radius:8px;border:1px solid #2e3350;background:transparent;color:#8890aa;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;">🔄 Back Market</button>
  </div>

  <div id="amazon-section">
  <div class="card">
    <div class="card-title">① Seleziona modello</div>
    <div class="selector-grid">
      <label class="field">
        <span>Serie</span>
        <select id="sel-series" onchange="updateModels()">
          <option value="">— Serie —</option>
          <option>SE</option><option>12</option><option>13</option>
          <option>14</option><option>15</option><option>16</option>
        </select>
      </label>
      <label class="field">
        <span>Modello</span>
        <select id="sel-model" onchange="updateStorage()" disabled>
          <option value="">— Modello —</option>
        </select>
      </label>
      <label class="field">
        <span>Storage</span>
        <select id="sel-storage" onchange="updateColors()" disabled>
          <option value="">— Storage —</option>
        </select>
      </label>
      <label class="field">
        <span>Colore</span>
        <select id="sel-color" onchange="updateASINs()" disabled>
          <option value="">— Colore —</option>
        </select>
      </label>
    </div>

    <div class="search-row">
      <label class="field" style="flex:1;min-width:200px">
        <span>ASIN (oppure inserisci manualmente)</span>
        <input id="asin-input" class="mono" type="text" placeholder="es. B09MJSL8MR" maxlength="10" autocomplete="off" spellcheck="false" oninput="this.value=this.value.toUpperCase()" />
        <div class="asin-status" id="asin-status"></div>
      </label>
      <label class="field" style="min-width:130px">
        <span>Prezzo acquisto (€)</span>
        <input id="buy-price" type="number" min="0" placeholder="es. 300" style="font-family:inherit;" />
      </label>
      <button class="btn" id="search-btn" onclick="doSearch()">
        <span id="btn-label">Cerca su tutti i mercati</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </div>
  </div>

  <div id="result"></div>
  </div><!-- end amazon-section -->

      <div class="card-title">Back Market — Prezzi BuyBox per paese</div>

        <input id="bm-search" placeholder="Cerca per modello o SKU..." oninput="filterBM()" style="flex:1;min-width:200px;background:#0f1117;border:1px solid #2e3350;border-radius:8px;color:#e8eaf0;font-size:12px;padding:8px 12px;font-family:inherit;outline:none;" />

<script>
function showMainTab(tab) {
  document.getElementById('amazon-section').style.display = tab==='amazon' ? 'block' : 'none';
  document.getElementById('bm-section').style.display = tab==='backmarket' ? 'block' : 'none';
  document.getElementById('tab-amazon').style.borderColor = tab==='amazon' ? '#4f8ef7' : '#2e3350';
  document.getElementById('tab-amazon').style.background = tab==='amazon' ? 'rgba(79,142,247,0.15)' : 'transparent';
  document.getElementById('tab-amazon').style.color = tab==='amazon' ? '#4f8ef7' : '#8890aa';
  document.getElementById('tab-bm').style.borderColor = tab==='backmarket' ? '#4f8ef7' : '#2e3350';
  document.getElementById('tab-bm').style.background = tab==='backmarket' ? 'rgba(79,142,247,0.15)' : 'transparent';
  document.getElementById('tab-bm').style.color = tab==='backmarket' ? '#4f8ef7' : '#8890aa';
}

// ─── BACK MARKET ─────────────────────────────────────────────────────────────
let bmData = null;
const BM_FLAGS = {it:'🇮🇹',fr:'🇫🇷',de:'🇩🇪',es:'🇪🇸',nl:'🇳🇱'};
const BM_COUNTRIES = ['it','fr','de','es','nl'];
const GRADE_LABELS = {EXCELLENT:'Eccellente',VERY_GOOD:'Molto buono',GOOD:'Buono'};

async function loadBMData() {
  const btn = document.getElementById('bm-load-btn');
  const status = document.getElementById('bm-status');
  btn.textContent = '⟳ Caricamento...';
  btn.disabled = true;
  status.textContent = 'Recupero dati da IT, FR, DE, ES, NL...';

  try {
    const r = await fetch('/api/backmarket/all');
    const data = await r.json();
    bmData = data;

    // Build unified product map by backmarket_id
    const products = {};
    for (const country of BM_COUNTRIES) {
      for (const listing of (data[country] || [])) {
        const bid = listing.backmarket_id;
        if (!products[bid]) products[bid] = { sku: listing.sku, title: listing.title, grade: listing.grade, countries: {} };
        products[bid].countries[country] = {
          price: listing.price,
          min_price: listing.min_price,
          max_price: listing.max_price,
          state: listing.publication_state,
        };
      }
    }

    bmData._products = products;
    renderBMTable(products);
    status.textContent = `✓ ${Object.keys(products).length} prodotti caricati`;
  } catch(e) {
    status.textContent = 'Errore: ' + e.message;
  }

  btn.textContent = '⟳ Aggiorna';
  btn.disabled = false;
}

function filterBM() {
  if (!bmData?._products) return;
  const q = document.getElementById('bm-search').value.toLowerCase().trim();
  const filtered = {};
  for (const [bid, p] of Object.entries(bmData._products)) {
    if (!q || p.sku?.toLowerCase().includes(q) || p.title?.toLowerCase().includes(q)) {
      filtered[bid] = p;
    }
  }
  renderBMTable(filtered);
}

function renderBMTable(products) {
  const wrap = document.getElementById('bm-table-wrap');
  const entries = Object.entries(products);

  if (!entries.length) {
    wrap.innerHTML = '<div style="text-align:center;padding:40px;color:#8890aa;">Nessun risultato</div>';
    return;
  }

  const rows = entries.map(([bid, p]) => {
    const cCells = BM_COUNTRIES.map(c => {
      const d = p.countries[c];
      if (!d) return `<td style="padding:7px 10px;color:#2e3350;text-align:center;">—</td>`;
      const price = d.price ? '€'+parseFloat(d.price).toFixed(0) : '—';
      const bb = d.max_price ? '€'+d.max_price : '—';
      const isActive = d.state === 3;
      return `<td style="padding:7px 10px;text-align:center;">
        <div style="font-size:12px;font-weight:700;color:${isActive?'#48bb78':'#8890aa'}">${price}</div>
        <div style="font-size:9px;color:#4f8ef7;">BB: ${bb}</div>
      </td>`;
    }).join('');

    return `<tr style="border-bottom:1px solid rgba(46,51,80,0.5);">
      <td style="padding:7px 10px;">
        <div style="font-size:11px;font-weight:600;color:#e8eaf0;">${p.sku||'—'}</div>
        <div style="font-size:9px;color:#8890aa;margin-top:1px;">${GRADE_LABELS[p.grade]||p.grade} · BM#${bid}</div>
      </td>
      ${cCells}
    </tr>`;
  }).join('');

  wrap.innerHTML = `<div style="background:#1a1d27;border:1px solid #2e3350;border-radius:10px;overflow:hidden;">
    <div style="overflow-x:auto;max-height:60vh;overflow-y:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:11px;">
        <thead style="position:sticky;top:0;background:#1a1d27;">
          <tr style="border-bottom:2px solid #2e3350;">
            <th style="padding:8px 10px;text-align:left;font-size:9px;color:#8890aa;text-transform:uppercase;letter-spacing:1px;">Prodotto</th>
            ${BM_COUNTRIES.map(c=>`<th style="padding:8px 10px;text-align:center;font-size:12px;">${BM_FLAGS[c]}</th>`).join('')}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}
</script>

function updateASINs() {
  const s=document.getElementById("sel-series").value, m=document.getElementById("sel-model").value;
  const st=document.getElementById("sel-storage").value, c=document.getElementById("sel-color").value;
  const row=CATALOG.find(r=>r[0]===s&&r[1]===m&&r[2]===st&&r[3]===c);

  const status=document.getElementById("asin-status");

    if (asin) {

      status.className="asin-status found";

      status.className="asin-status missing";
      status.textContent="⚠ ASIN non ancora inserito";

function calcMarginCell(buyPrice, sellPrice) {
  if (!buyPrice || !sellPrice || sellPrice <= 0) return '<span class="na">—</span>';
  const commission = sellPrice * 0.073 + 15;
  const ivaMargin = (sellPrice - buyPrice) * 22 / 122;
  const net = sellPrice - buyPrice - commission - ivaMargin;
  const color = net >= 0 ? 'var(--success)' : 'var(--danger)';
  return `<span style="font-weight:700;color:${color}">€${net.toFixed(0)}</span>`;
}

function parseNinjaPrice(str) {
  if (!str) return null;
  const n = parseFloat(str.replace(/[^\d,\.]/g,'').replace(',','.'));
  return isNaN(n) ? null : n;
}

function getLowestByCondition(offers, conditionKeyword) {
  if (!offers || !offers.length) return null;
  let min = null;
  for (const o of offers) {
    const cond = (o.product_condition||'').toLowerCase();
    if (!cond.includes(conditionKeyword)) continue;
    const price = parseNinjaPrice(o.product_price);
    const ship = parseNinjaPrice(o.delivery_price) || 0;
    if (price === null) continue;
    const total = price + ship;
    if (min === null || total < min) min = total;
  }
  return min;
}

function getBuyBoxPrice(data) {
  // Try buy_boxes first
  if (data.buy_boxes && data.buy_boxes.length) {
    const bb = data.buy_boxes[0];
    return parseNinjaPrice(bb.price);
  }
  // Fallback to product_price
  return parseNinjaPrice(data.product_price);
}

// Domain mapping for SerpApi
const SERP_DOMAIN = {IT:"amazon.it", DE:"amazon.de", FR:"amazon.fr", ES:"amazon.es"};

async function fetchMarket(asin, mkt) {
  const amazon_domain = SERP_DOMAIN[mkt.id] || `amazon.${mkt.id.toLowerCase()}`;
  const r = await fetch(`/api/serpapi?asin=${encodeURIComponent(asin)}&domain=${mkt.id.toLowerCase()}`);
  const d = await r.json();
  if (!r.ok) throw new Error(d.error||`HTTP ${r.status}`);
  if (d.error) throw new Error(d.error);
  return d;
}

  const lbl=document.getElementById("btn-label");
  const spin=document.getElementById("spinner");
  const result=document.getElementById("result");
  if (!asin) { alert("Inserisci un ASIN"); return; }

  const s=document.getElementById("sel-series").value, m=document.getElementById("sel-model").value;
  const st=document.getElementById("sel-storage").value, c=document.getElementById("sel-color").value;
  const row=CATALOG.find(r=>r[0]===s&&r[1]===m&&r[2]===st&&r[3]===c);

  btn.disabled=true; lbl.style.display="none"; spin.style.display="block";
  result.style.display="none"; result.innerHTML="";

  const tableRows = MARKETS.map(mkt=>{
    const mktAsin = row ? (row[mkt.idx]||asin) : asin;
    return `<tr id="row-${mkt.id}">
      <td><div class="market-cell"><span class="market-flag">${mkt.flag}</span>${mkt.name}</div></td>
      <td><span class="scanning-cell">⟳ ricerca in corso...</span></td>
      <td><span class="scanning-cell">...</span></td>
      <td><span class="scanning-cell">...</span></td>
      <td><a class="view-link" href="${mkt.url}${mktAsin}" target="_blank">Apri ↗</a></td>
    </tr>`;
  }).join("");

  result.innerHTML = `<div class="product-card">
    <div class="product-header">
      <div class="product-placeholder">📦</div>
      <div class="product-meta"><h2 id="product-title">Ricerca in corso...</h2><span class="asin-badge" id="product-asin">${asin}</span></div>
    </div>
    <div class="markets-table-wrap">
      <table class="markets-table">
        <thead><tr>
          <th>Mercato</th><th>Buy Box</th><th>Eccellente</th><th>Guadagno netto</th><th>Link</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    <div class="token-info" id="token-info"></div>
  </div>`;
  result.style.display="block";

  let title=null, image=null;
  const excellentPrices=[];

  for (let i=0;i<MARKETS.length;i++) {
    const mkt=MARKETS[i];
    const mktAsin=row?(row[mkt.idx]||asin):asin;
    const rowEl=document.getElementById(`row-${mkt.id}`);

    try {
      const data = await fetchMarket(mktAsin, mkt);
      const po = data.purchase_options || {};
      const pr = data.product_results || {};

      if (!title && pr.title) {
        title = pr.title;
        document.getElementById("product-title").textContent = title;
        if (pr.thumbnail) {
          document.querySelector(".product-placeholder").outerHTML=`<img class="product-image" src="${pr.thumbnail}" alt="" onerror="this.style.display='none'" />`;
        }
      }

      // SerpApi purchase_options
      const excellentPrice = po.refurbished_excellent?.extracted_price || null;
      const excellentDelivery = po.refurbished_excellent?.delivery?.[0] || '';
      const excellentShip = excellentDelivery.includes('FREE') ? 0 : (parseNinjaPrice(excellentDelivery) || 0);
      const excellent = excellentPrice ? excellentPrice + excellentShip : null;

      const buyBox = pr.extracted_price || excellentPrice || null;

      const buyPrice = parseFloat(document.getElementById("buy-price").value)||0;
      const sellPrice = excellent || buyBox || 0;
      const marginCell = calcMarginCell(buyPrice, sellPrice);

      if (excellent) excellentPrices.push({mkt, val: excellent});

      const bbStr = buyBox ? `€${buyBox.toFixed(2)}` : '<span class="na">N/D</span>';
      const exStr = excellent ? `<span class="price-val" data-val="${excellent}">€${excellent.toFixed(2)}</span>` : '<span class="price-val na">—</span>';

      rowEl.innerHTML=`
        <td><div class="market-cell"><span class="market-flag">${mkt.flag}</span>${mkt.name}</div></td>
        <td><span class="price-val">${bbStr}</span></td>
        <td>${exStr}</td>
        <td>${marginCell}</td>
        <td><a class="view-link" href="${mkt.url}${mktAsin}" target="_blank">Apri ↗</a></td>`;

    } catch(e) {
      rowEl.innerHTML=`
        <td><div class="market-cell"><span class="market-flag">${mkt.flag}</span>${mkt.name}</div></td>
        <td colspan="3"><span class="price-val na">${e.message||"Errore"}</span></td>
        <td><a class="view-link" href="${mkt.url}${mktAsin}" target="_blank">Apri ↗</a></td>`;
    }

    if (i<MARKETS.length-1) await new Promise(r=>setTimeout(r,500));
  }

  // Highlight highest Eccellente price
  if (excellentPrices.length) {
    const maxVal = Math.max(...excellentPrices.map(x=>x.val));
    document.querySelectorAll("table.markets-table tbody tr td .price-val[data-val]").forEach(el=>{
      const v = parseFloat(el.getAttribute("data-val"));
      if (v === maxVal) {
        el.classList.add("highlight");
        el.innerHTML += `<span class="best-badge">↑ Vendi qui</span>`;
      }
    });
  }

  btn.disabled=false; lbl.style.display="inline"; spin.style.display="none";
}

document.getElementById("asin-input").addEventListener("keydown", e=>{ if(e.key==="Enter") doSearch(); });
</script>
</body>
</html>
