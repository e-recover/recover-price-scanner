<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recover — Price Scanner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07090f;
      --surface: #0d1017;
      --card: #111520;
      --border: #1b2235;
      --accent: #2563eb;
      --gold: #f59e0b;
      --green: #10b981;
      --red: #ef4444;
      --text: #f1f5f9;
      --sub: #64748b;
      --muted: #374151;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 860px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 2.5rem; }
    header .brand { font-size: 9px; letter-spacing: 6px; color: var(--sub); text-transform: uppercase; margin-bottom: 8px; }
    header h1 { font-size: 2rem; font-weight: 800; color: var(--gold); font-family: Georgia, serif; }
    header p { margin-top: 0.5rem; color: var(--sub); font-size: 0.9rem; }

    .search-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .search-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .input-group { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; }
    label { font-size: 0.75rem; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; }
    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      padding: 0.65rem 0.9rem;
      outline: none;
      font-family: "Courier New", monospace;
      letter-spacing: 1px;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--sub); }

    .search-btn {
      align-self: flex-end;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.65rem 1.75rem;
      transition: opacity 0.2s;
      white-space: nowrap;
      min-width: 100px;
    }
    .search-btn:hover { opacity: 0.85; }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #result { display: none; }

    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      color: var(--red);
      padding: 1rem 1.25rem;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .product-header {
      display: flex;
      gap: 1.25rem;
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
    }
    .product-img {
      width: 90px; height: 90px;
      object-fit: contain;
      border-radius: 8px;
      background: var(--card);
      flex-shrink: 0;
    }
    .product-placeholder {
      width: 90px; height: 90px;
      background: var(--card);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; flex-shrink: 0;
    }
    .product-meta h2 { font-size: 1rem; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
    .asin-badge {
      display: inline-block;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--sub);
      font-family: "Courier New", monospace;
      font-size: 0.75rem;
      padding: 2px 7px;
    }

    table.price-table {
      width: 100%;
      border-collapse: collapse;
    }
    table.price-table th {
      padding: 0.75rem 1.25rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--sub);
      border-bottom: 1px solid var(--border);
    }
    table.price-table td {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    table.price-table tbody tr:last-child td { border-bottom: none; }
    table.price-table tbody tr.best-row { background: rgba(16,185,129,0.05); }
    table.price-table tbody tr:hover { background: rgba(255,255,255,0.02); }

    .market-cell { display: flex; align-items: center; gap: 0.6rem; font-weight: 600; }
    .market-flag { font-size: 1.3rem; }

    .price-val { font-size: 1.1rem; font-weight: 700; }
    .price-val.best { color: var(--green); }
    .price-val.na { color: var(--sub); font-size: 0.9rem; font-weight: 400; }

    .best-badge {
      display: inline-block;
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 4px;
      color: var(--green);
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 6px;
      margin-left: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      vertical-align: middle;
    }

    .view-link { color: var(--accent); text-decoration: none; font-size: 0.85rem; }
    .view-link:hover { opacity: 0.75; }

    .token-info {
      text-align: right;
      padding: 8px 1.25rem;
      font-size: 0.75rem;
      color: var(--sub);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      .search-row { flex-direction: column; }
      .search-btn { width: 100%; }
      .product-header { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">Recover Srl — Padova · Vicenza</div>
      <h1>📱 Price Scanner</h1>
      <p>Prezzi ricondizionato eccellente · Amazon IT · DE · FR · ES</p>
    </header>

    <div class="search-card">
      <form id="search-form">
        <div class="search-row">
          <div class="input-group">
            <label for="asin-input">ASIN Amazon</label>
            <input id="asin-input" type="text" placeholder="es. B09MJSL8MR" maxlength="10" autocomplete="off" spellcheck="false" />
          </div>
          <button type="submit" class="search-btn" id="search-btn">
            <span id="btn-label">Cerca</span>
            <div class="spinner" id="spinner"></div>
          </button>
        </div>
      </form>
    </div>

    <div id="result"></div>
  </div>

  <script>
    const MARKETS = [
      { domain:"8", name:"Amazon.it", flag:"🇮🇹", url:"https://www.amazon.it/dp/" },
      { domain:"3", name:"Amazon.de", flag:"🇩🇪", url:"https://www.amazon.de/dp/" },
      { domain:"4", name:"Amazon.fr", flag:"🇫🇷", url:"https://www.amazon.fr/dp/" },
      { domain:"9", name:"Amazon.es", flag:"🇪🇸", url:"https://www.amazon.es/dp/" },
    ];

    function fmt(cents) {
      if (cents == null || cents < 0) return null;
      return "€" + (cents / 100).toFixed(2);
    }

    function latestVal(ch) {
      if (!ch || ch.length < 2) return null;
      for (let i = ch.length - 1; i >= 0; i -= 2) {
        if (ch[i] > 0) return ch[i];
      }
      return null;
    }

    function getPrice(csv) {
      // csv[9] = Ricondizionato/Renewed (Eccellente)
      // fallback: csv[2] = Used, csv[1] = New 3rd party
      return latestVal(csv[9]) || latestVal(csv[2]) || latestVal(csv[1]) || null;
    }

    async function fetchMarket(asin, domain) {
      const r = await fetch(`/api/keepa?asin=${encodeURIComponent(asin)}&domain=${encodeURIComponent(domain)}`);
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
      return d;
    }

    function render(asin, results) {
      const el = document.getElementById("result");
      let title = null, image = null, tokensLeft = null;

      for (const {data} of results) {
        const p = data?.products?.[0];
        if (!p) continue;
        title = title || p.title;
        image = image || (p.imagesCSV ? `https://images-na.ssl-images-amazon.com/images/I/${p.imagesCSV.split(",")[0]}` : null);
        if (data.tokensLeft != null) tokensLeft = data.tokensLeft;
      }

      const rows = results.map(({market, data, error}) => {
        if (error || !data?.products?.[0]) return {market, price:null, error: error||"N/D"};
        return {market, price: getPrice(data.products[0].csv || []), error:null};
      });

      const prices = rows.filter(r=>r.price!=null).map(r=>r.price);
      const best = prices.length ? Math.min(...prices) : null;

      rows.sort((a,b) => {
        if (a.price==null && b.price==null) return 0;
        if (a.price==null) return 1;
        if (b.price==null) return -1;
        return a.price - b.price;
      });

      const imgHtml = image
        ? `<img class="product-img" src="${image}" alt="" onerror="this.style.display='none'" />`
        : `<div class="product-placeholder">📦</div>`;

      const tRows = rows.map(({market, price, error}) => {
        const isBest = price!=null && price===best;
        const f = fmt(price);
        const pCell = f
          ? `<span class="price-val${isBest?" best":""}">${f}${isBest?'<span class="best-badge">Migliore</span>':""}</span>`
          : `<span class="price-val na">${error||"N/D"}</span>`;
        return `<tr class="${isBest?"best-row":""}">
          <td><div class="market-cell"><span class="market-flag">${market.flag}</span>${market.name}</div></td>
          <td>${pCell}</td>
          <td><a class="view-link" href="${market.url}${asin}" target="_blank">Apri ↗</a></td>
        </tr>`;
      }).join("");

      el.innerHTML = `
        <div class="product-card">
          <div class="product-header">
            ${imgHtml}
            <div class="product-meta">
              <h2>${title||asin}</h2>
              <span class="asin-badge">${asin}</span>
            </div>
          </div>
          <table class="price-table">
            <thead><tr><th>Mercato</th><th>Prezzo Eccellente</th><th>Link</th></tr></thead>
            <tbody>${tRows}</tbody>
          </table>
          ${tokensLeft!=null ? `<div class="token-info">⬡ Token Keepa rimasti: ${tokensLeft}</div>` : ""}
        </div>`;
      el.style.display = "block";
    }

    document.getElementById("search-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const asin = document.getElementById("asin-input").value.trim().toUpperCase();
      const btn = document.getElementById("search-btn");
      const lbl = document.getElementById("btn-label");
      const spin = document.getElementById("spinner");
      const el = document.getElementById("result");
      if (!asin) return;

      btn.disabled = true;
      lbl.style.display = "none";
      spin.style.display = "block";
      el.style.display = "none";
      el.innerHTML = "";

      try {
        const results = [];
        for (let i = 0; i < MARKETS.length; i++) {
          if (i > 0) await new Promise(r => setTimeout(r, 1500));
          try {
            const data = await fetchMarket(asin, MARKETS[i].domain);
            results.push({market: MARKETS[i], data, error: null});
          } catch(err) {
            results.push({market: MARKETS[i], data: null, error: err.message});
          }
        }
        if (results.every(r => r.error)) {
          el.innerHTML = `<div class="error-box">Impossibile recuperare dati. Controlla l'ASIN o i token Keepa.</div>`;
          el.style.display = "block";
          return;
        }
        render(asin, results);
      } catch(err) {
        el.innerHTML = `<div class="error-box">Errore di rete.</div>`;
        el.style.display = "block";
      } finally {
        btn.disabled = false;
        lbl.style.display = "inline";
        spin.style.display = "none";
      }
    });
  </script>
</body>
</html>
